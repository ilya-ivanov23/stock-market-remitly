events {
    worker_connections 1024;
}

http {
    upstream backend {
        # max_fails=1 и fail_timeout=2s гарантируют, что если один контейнер убили через /chaos, 
        # Nginx мгновенно перекинет запрос на живой инстанс.
        server app1:8080 max_fails=1 fail_timeout=2s;
        server app2:8080 max_fails=1 fail_timeout=2s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Если инстанс упал прямо во время запроса, пробуем другой
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }
}
