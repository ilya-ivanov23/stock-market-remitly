events {
    worker_connections 1024;
}

http {
    upstream backend {
        # max_fails=1 and fail_timeout=2s guarantee that if one container is killed via /chaos,
        # Nginx will instantly reroute the request to the healthy instance.
        server app1:8080 max_fails=1 fail_timeout=2s;
        server app2:8080 max_fails=1 fail_timeout=2s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # If instance fails during request, try another
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }
}
